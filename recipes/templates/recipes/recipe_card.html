<div class="card">
    <div class="recipe-row">
        <div class="with-thumb">
            {% include "recipes/thumbnail.html" with object=recipe %}
            <div>
                <a class="recipe-name" href="{{ recipe.get_absolute_url }}{% if highlight %}?highlight={{ highlight }}{% endif %}">{{ name|safe }}</a>
                {% if date %}<span class="ts">{{ date }}</span>{% endif %}
            </div>
        </div>
        <p class="snippet">{{ snippet|safe }}</p>
        {% if not hide_lesson %}
        <a class="doc-tag" href="{{ recipe.lesson.get_absolute_url }}{% if highlight %}?highlight={{ highlight }}{% endif %}">
            <svg width="9" height="10" viewBox="0 0 10 12" fill="none"><path d="M1 1h5l3 3v7H1V1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M6 1v3h3" stroke="currentColor" stroke-width="1.2"/></svg>
            {{ recipe.lesson.title }}
        </a>
        {% endif %}
    </div>
</div>
